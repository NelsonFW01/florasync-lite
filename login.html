<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FloraSync Lite — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #EAF3DE;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      border: 1px solid #D3D1C7;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 2rem;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: #639922;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-name  { font-size: 18px; font-weight: 700; color: #27500A; }
    .logo-sub   { font-size: 11px; color: #888780; margin-top: 1px; }

    h1 { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
    .subtitle { font-size: 14px; color: #888780; margin-bottom: 1.75rem; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #333;
      margin-bottom: 5px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #D3D1C7;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: inherit;
      color: #1a1a1a;
    }

    input:focus {
      border-color: #639922;
      box-shadow: 0 0 0 3px rgba(99,153,34,0.12);
    }

    .btn-login {
      width: 100%;
      padding: 11px;
      background: #639922;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.2s;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-login:hover    { background: #3B6D11; }
    .btn-login:disabled { background: #D3D1C7; cursor: not-allowed; }

    .error-msg {
      font-size: 13px;
      color: #A32D2D;
      background: #FCEBEB;
      border: 1px solid #f5c6c6;
      border-radius: 8px;
      padding: 10px 12px;
      margin-top: 0.75rem;
      display: none;
    }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 11px;
      color: #888780;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-row">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="white" width="22" height="22">
          <path d="M17 8C8 10 5.9 16.17 3.82 21.34L5.71 22l1-2.3A4.49 4.49 0 008 20C19 20 22 3 22 3c-1 2-8 2-8 2 3-3 8-2 8-2C19 14 12 19 7 19a6.65 6.65 0 01-3.41-.93L3 21"/>
        </svg>
      </div>
      <div>
        <div class="logo-name">FloraSync Lite</div>
        <div class="logo-sub">Greenhouse IoT Monitoring</div>
      </div>
    </div>

    <h1>Masuk ke akun</h1>
    <p class="subtitle">Pantau greenhouse kamu secara real-time</p>

    <form id="loginForm">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="nama@email.com" required autocomplete="email"/>

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Password" required autocomplete="current-password"/>

      <button type="submit" class="btn-login" id="loginBtn">Masuk</button>
      <div class="error-msg" id="errorMsg"></div>
    </form>

    <div class="footer">© 2026 FloraSync Lite · Binus University</div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { firebaseConfig } from "./firebase-config.js";

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Kalau sudah login langsung ke dashboard
    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = "dashboard.html";
    });

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn      = document.getElementById("loginBtn");
      const errorMsg = document.getElementById("errorMsg");
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div> Memproses...';
      errorMsg.style.display = "none";

      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = "dashboard.html";
      } catch (err) {
        let msg = "Gagal masuk. Coba lagi.";
        if (err.code === "auth/invalid-credential" || err.code === "auth/wrong-password" || err.code === "auth/user-not-found") {
          msg = "Email atau password salah.";
        } else if (err.code === "auth/too-many-requests") {
          msg = "Terlalu banyak percobaan. Tunggu sebentar.";
        } else if (err.code === "auth/network-request-failed") {
          msg = "Tidak ada koneksi internet.";
        }
        errorMsg.textContent  = msg;
        errorMsg.style.display = "block";
        btn.disabled = false;
        btn.textContent = "Masuk";
      }
    });
  </script>
</body>
</html>
